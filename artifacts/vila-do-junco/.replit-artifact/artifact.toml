kind = "web"
previewPath = "/"
title = "Vila do Junco"
version = "1.0.0"
id = "artifacts/vila-do-junco"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20840

[services.development]
run = "pnpm --filter @workspace/vila-do-junco run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/vila-do-junco", "run", "build" ]
publicDir = "artifacts/vila-do-junco/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20840"
BASE_PATH = "/"
