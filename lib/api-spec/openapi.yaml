        itemId:
          type: integer
        itemName:
          type: string
        customerId:
          type: ["integer", "null"]
        customerName:
          type: string
        customerEmail:
          type: string
        customerPhone:
          type: string
        date:
          type: string
        time:
          type: ["string", "null"]
        people:
          type: integer
        totalPrice:
          type: number
        status:
          type: string
        notes:
