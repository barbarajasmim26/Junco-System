        name:
          type: string
        description:
          type: string
        origin:
          type: string
        destination:
          type: string
        price:
          type: number
        pricePerPerson:
          type: boolean
        maxPeople:
          type: integer
        duration:
          type: string
        imageUrl:
          type: string
        vehicleType:
          type: string
        active:
          type: boolean

    Booking:
