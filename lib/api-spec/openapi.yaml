components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Tour:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
        duration:
          type: string
        price:
          type: number
        maxPeople:
          type: integer
        category:
          type: string
        imageUrl:
          type: ["string", "null"]
        images:
          type: array
          items:
            type: string
        highlights:
          type: array
          items:
            type: string
        included:
          type: array
          items:
            type: string
        meetingPoint:
          type: ["string", "null"]
        active:
          type: boolean
        createdAt:
          type: string
      required:
        - id
        - name
        - description
        - duration
        - price
        - maxPeople
        - category
        - active
        - createdAt
        - images
        - highlights
        - included

    TourInput:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        duration:
          type: string
        price:
          type: number
        maxPeople:
          type: integer
        category:
          type: string
        imageUrl:
          type: string
        images:
          type: array
          items:
            type: string
        highlights:
          type: array
          items:
            type: string
        included:
          type: array
          items:
            type: string
        meetingPoint:
          type: string
        active:
          type: boolean
      required:
        - name
        - description
        - duration
        - price
        - maxPeople
        - category

    TourUpdate:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        duration:
          type: string
        price:
          type: number
        maxPeople:
          type: integer
        category:
          type: string
        imageUrl:
          type: string
        images:
          type: array
          items:
            type: string
        highlights:
          type: array
          items:
            type: string
        included:
          type: array
          items:
            type: string
        meetingPoint:
          type: string
        active:
          type: boolean

    Transfer:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
        origin:
          type: string
        destination:
          type: string
        price:
          type: number
        pricePerPerson:
          type: boolean
        maxPeople:
          type: integer
        duration:
          type: string
        imageUrl:
          type: ["string", "null"]
        vehicleType:
          type: string
        active:
          type: boolean
        createdAt:
          type: string
      required:
        - id
        - name
        - description
        - origin
        - destination
        - price
        - pricePerPerson
        - maxPeople
        - duration
        - vehicleType
        - active
        - createdAt

    TransferInput:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        origin:
          type: string
        destination:
          type: string
        price:
          type: number
        pricePerPerson:
          type: boolean
        maxPeople:
          type: integer
        duration:
          type: string
        imageUrl:
          type: string
        vehicleType:
          type: string
        active:
          type: boolean
      required:
        - name
        - description
        - origin
        - destination
        - price
        - maxPeople
        - duration
        - vehicleType

    TransferUpdate:
      type: object
